name: GRC Validator Security & Logic CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This silences the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12" # <-- Bumped this up to satisfy numpy
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Deterministic Test Suite
      # Injecting a dummy environment variable so OpenAI doesn't crash on import
      env:
        OPENAI_API_KEY: "mock"
      run: |
        pytest -v